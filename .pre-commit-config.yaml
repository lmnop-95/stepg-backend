repos:
  - repo: local
    hooks:
      - id: export-openapi
        name: Export OpenAPI snapshot
        entry: uv run python scripts/export_openapi.py
        language: system
        pass_filenames: false
        files: ^(apps/api/.*\.py|packages/core/stepg_core/.*\.py|scripts/export_openapi\.py)$
        stages: [pre-commit]
