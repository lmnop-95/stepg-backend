[alembic]
script_location = packages/core/stepg_core/db/migrations
file_template = %%(rev)s_%%(slug)s
prepend_sys_path = .
timezone = UTC
sqlalchemy.url =

[post_write_hooks]
# ruff_check는 빈 마이그레이션의 op/sa import를 F401로 제거해버려 의도적으로 제외.
# 신규 리비전은 ruff format만 거치고, 추가 lint는 pre-commit 단계에서 처리.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
