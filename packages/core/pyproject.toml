[project]
name = "stepg-core"
version = "0.0.0"
description = "stepg shared core (config, db, http, errors, features)"
requires-python = ">=3.14"
dependencies = [
    "alembic>=1.14",
    "asyncpg>=0.31",
    "easyocr>=1.7",
    "httpx>=0.28",
    "pdfplumber>=0.11",
    "pydantic-settings>=2.6",
    "pydantic>=2.10",
    "python-hwpx>=2.9",
    "sqlalchemy-utils>=0.41",
    "sqlalchemy[asyncio]>=2.0",
    "tenacity>=9.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["stepg_core"]
