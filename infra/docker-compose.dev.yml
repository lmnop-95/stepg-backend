services:
  postgres:
    image: postgres:18-alpine
    container_name: stepg-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stepg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stepg}
      POSTGRES_DB: ${POSTGRES_DB:-stepg}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stepg-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
